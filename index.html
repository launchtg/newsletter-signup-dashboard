<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Signup Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 24px;
            border: 1px solid #2a2a2a;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #888888;
            font-size: 16px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #2a2a2a;
        }

        .stat-value {
            font-size: 36px;

            color: #B4FF39;

        }

        .stat-label {
            font-size: 14px;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 24px;
            border: 1px solid #2a2a2a;
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .badge {
            background: #B4FF39;
            color: #0a0a0a;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .upload-area {
            border: 2px dashed #2a2a2a;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #888888;
        }

        .upload-area:hover {
            border-color: #B4FF39;
            background: #1a1a1a;
        }

        .upload-area.dragover {
            border-color: #B4FF39;
            background: #1a1a1a;
        }

        .btn {
            background: #B4FF39;
            color: #0a0a0a;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #a0e830;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(180, 255, 57, 0.4);
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
        }

        .btn-danger {
            background: #f56565;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .newsletter-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .newsletter-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid #2a2a2a;
            transition: background 0.2s;
        }

        .newsletter-item:hover {
            background: #252525;
        }

        .newsletter-info {
            flex: 1;
        }

        .newsletter-name {
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .newsletter-url {
            font-size: 13px;
            color: #888888;
        }

        .status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 12px;
        }

        .status-success {
            background: #B4FF39;
            color: #0a0a0a;
        }

        .status-pending {
            background: #4a4a4a;
            color: #ffffff;
        }

        .status-failed {
            background: #ff4444;
            color: #ffffff;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #2a2a2a;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 12px;
        }

        .progress-fill {
            height: 100%;
            background: #B4FF39;
            transition: width 0.3s;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 2px solid #2a2a2a;
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 600;
            color: #888888;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }

        .tab.active {
            color: #B4FF39;
            border-bottom-color: #B4FF39;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        #fileInput {
            display: none;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .icon {
            width: 20px;
            height: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666666;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
    </style>
</head>

        <div class="stats-grid">

    <script>
        // Supabase Client
        const SUPABASE_URL = 'https://eytpovjjhwprfedrdceu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5dHBvdmpqaHdwcmZlZHJkY2V1Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3Mjg0NjYwNSwiZXhwIjoyMDg4NDIyNjA1fQ.p64Gk9WfSXwV4fCBlJV-o2JH8zrkX6hFTdzK7yxLC0o';

        class SupabaseClient {
          constructor() {
            this.baseUrl = SUPABASE_URL;
            this.apiKey = SUPABASE_KEY;
          }

          async request(path, method = 'GET', body = null) {
            const options = {
              method: method,
              headers: {
                'apikey': this.apiKey,
                'Authorization': `Bearer ${this.apiKey}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation'
              }
            };

            if (body && method !== 'GET') {
              options.body = JSON.stringify(body);
            }

            const response = await fetch(this.baseUrl + path, options);
            
            if (!response.ok) {
              const text = await response.text();
              throw new Error(`Supabase error: ${response.status} ${response.statusText} - ${text}`);
            }

            return await response.json();
          }

          async upsertNewsletter(newsletter) {
            return this.request('/rest/v1/newsletters', 'POST', newsletter);
          }

          async upsertNewsletters(newsletters) {
            return this.request('/rest/v1/newsletters', 'POST', newsletters);
          }

          async getNewsletters(status = null) {
            let path = '/rest/v1/newsletters?select=*&order=created_at.desc';
            if (status) {
              path += `&status=eq.${status}`;
            }
            return this.request(path, 'GET');
          }

          async updateStatus(url, status) {
            return this.request(
              `/rest/v1/newsletters?url=eq.${encodeURIComponent(url)}`,
              'PATCH',
              { 
                status: status,
                updated_at: new Date().toISOString(),
                signed_up_at: status === 'success' ? new Date().toISOString() : null
              }
            );
          }

          async deleteAll() {
            return this.request('/rest/v1/newsletters', 'DELETE');
          }
        }
    </script>
    <script>
        const supabase = new SupabaseClient();
        let newsletters = [];
        let statusMap = {};

        // Load existing data from Supabase
        async function loadData() {
            try {
                console.log('Loading from Supabase...');
                newsletters = await supabase.getNewsletters();
                
                // Build status map
                statusMap = {};
                newsletters.forEach(n => {
                    statusMap[n.url] = n.status || 'pending';
                });
                
                console.log(`Loaded ${newsletters.length} newsletters from Supabase`);
                updateUI();
            } catch (e) {
                console.error('Error loading from Supabase:', e);
                alert('⚠️ Could not connect to database. Check console for details.');
            }
        }

        // File upload handling
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (!file) return;

            console.log('File selected:', file.name, file.size, 'bytes');
            
            // Show loading indicator
            const uploadArea = document.getElementById('uploadArea');
            uploadArea.innerHTML = '<div style="font-size: 48px; margin-bottom: 16px;">⏳</div><h3>Processing CSV file...</h3>';

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const text = e.target.result;
                    console.log('File loaded, length:', text.length);
                    await parseCSV(text);
                } catch (error) {
                    console.error('Error processing file:', error);
                    alert('❌ Error processing file: ' + error.message);
                    resetUploadArea();
                }
            };
            reader.onerror = (e) => {
                console.error('File read error:', e);
                alert('❌ Could not read file');
                resetUploadArea();
            };
            reader.readAsText(file);
        }
        
        function resetUploadArea() {
            document.getElementById('uploadArea').innerHTML = `
                <div style="font-size: 48px; margin-bottom: 16px;">📄</div>
                <h3 style="margin-bottom: 8px;">Drop CSV file here or click to upload</h3>
                <p style="color: #718096; font-size: 14px;">Accepts CSV with URL column (36,000 newsletters from Fiverr)</p>
            `;
        }

        async function parseCSV(text) {
            console.log('Starting CSV parse...');
            
            const lines = text.split('\n').filter(l => l.trim());
            console.log('Total lines:', lines.length);
            
            if (lines.length < 2) {
                alert('CSV file appears to be empty');
                resetUploadArea();
                return;
            }

            // Parse headers
            const headers = parseCSVLine(lines[0]);
            console.log('Headers found:', headers.length, headers.slice(0, 10));
            
            // Find URL column (check multiple possible names)
            const urlIndex = headers.findIndex(h => {
                const lower = h.toLowerCase();
                return lower.includes('root domain') || 
                       lower.includes('primary domain') || 
                       lower.includes('url') || 
                       lower.includes('domain') ||
                       lower.includes('website');
            });
            
            if (urlIndex === -1) {
                alert('Could not find domain/URL column in CSV.\n\nFound columns:\n' + headers.slice(0, 20).join('\n'));
                resetUploadArea();
                return;
            }

            console.log('URL column index:', urlIndex, 'name:', headers[urlIndex]);

            newsletters = [];
            let parsed = 0;
            let skipped = 0;

            // Show progress
            const uploadArea = document.getElementById('uploadArea');
            
            for (let i = 1; i < lines.length; i++) {
                // Update progress every 1000 lines
                if (i % 1000 === 0) {
                    uploadArea.innerHTML = `<div style="font-size: 48px; margin-bottom: 16px;">⏳</div>
                        <h3>Processing... ${i.toLocaleString()} / ${lines.length.toLocaleString()}</h3>`;
                    await new Promise(r => setTimeout(r, 0)); // Allow UI update
                }
                
                const cols = parseCSVLine(lines[i]);
                if (cols.length < headers.length - 5) continue; // Skip malformed lines
                
                let domain = cols[urlIndex]?.trim();
                
                if (!domain) {
                    skipped++;
                    continue;
                }
                
                // Add https:// if missing
                if (!domain.startsWith('http')) {
                    domain = 'https://' + domain;
                }
                
                // Create contact object with Supabase schema
                const contact = {
                    url: domain,
                    name: extractName(domain),
                    platform: detectPlatform(domain),
                    company: null,
                    employees: null,
                    country: null,
                    status: 'pending',
                    data: {}
                };
                
                // Store key fields and rest in data JSONB
                headers.forEach((header, idx) => {
                    if (idx === urlIndex || !cols[idx]) return;
                    
                    const value = cols[idx].trim();
                    if (!value) return;
                    
                    // Map to Supabase columns
                    const lower = header.toLowerCase();
                    if (lower === 'company') contact.company = value;
                    else if (lower === 'employees') contact.employees = value;
                    else if (lower === 'country') contact.country = value;
                    else contact.data[header] = value;
                });
                
                newsletters.push(contact);
                parsed++;
            }

            console.log(`Parsed ${parsed} newsletters, skipped ${skipped}`);
            
            if (newsletters.length === 0) {
                alert('No valid domains found in CSV');
                resetUploadArea();
                return;
            }

            // Show saving progress
            uploadArea.innerHTML = `<div style="font-size: 48px; margin-bottom: 16px;">💾</div>
                <h3>Saving ${newsletters.length.toLocaleString()} newsletters to database...</h3>`;

            // Save to Supabase
            try {
                await saveData();
                
                updateUI();
                document.getElementById('startBtn').disabled = false;
                resetUploadArea();
                
                // Show success message
                const msg = `✅ Successfully loaded ${newsletters.length.toLocaleString()} newsletters!\n\n` +
                           `Stored in Supabase database\n` +
                           `Ready for automation!`;
                alert(msg);
            } catch (error) {
                console.error('Save error:', error);
                alert('❌ Error saving to database: ' + error.message);
                resetUploadArea();
            }
        }

        function parseCSVLine(line) {
            // Handle quoted fields with commas
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            
            return result.map(s => s.replace(/^"|"$/g, '').trim());
        }

        function extractName(url) {
            try {
                const hostname = new URL(url).hostname;
                return hostname.replace('www.', '').split('.')[0];
            } catch {
                return url;
            }
        }

        function detectPlatform(url) {
            if (url.includes('beehiiv.com')) return 'beehiiv';
            if (url.includes('substack.com')) return 'substack';
            if (url.includes('ghost.')) return 'ghost';
            return 'other';
        }

        function updateUI() {
            const total = newsletters.length;
            const success = newsletters.filter(n => statusMap[n.url] === 'success').length;
            const failed = newsletters.filter(n => statusMap[n.url] === 'failed').length;
            const pending = total - success - failed;

            document.getElementById('totalCount').textContent = total.toLocaleString();
            document.getElementById('successCount').textContent = success.toLocaleString();
            document.getElementById('pendingCount').textContent = pending.toLocaleString();
            document.getElementById('failedCount').textContent = failed.toLocaleString();

            renderList('allList', newsletters);
            renderList('pendingList', newsletters.filter(n => !statusMap[n.url]));
            renderList('successList', newsletters.filter(n => statusMap[n.url] === 'success'));
            renderList('failedList', newsletters.filter(n => statusMap[n.url] === 'failed'));
        }

        function renderList(elementId, items) {
            const list = document.getElementById(elementId);
            
            if (items.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 48px; margin-bottom: 16px;">📭</div>
                        <p>No newsletters in this category</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = items.map(n => {
                const status = statusMap[n.url] || 'pending';
                const statusClass = status === 'success' ? 'status-success' : 
                                  status === 'failed' ? 'status-failed' : 'status-pending';
                const statusText = status === 'success' ? '✓ Signed Up' : 
                                 status === 'failed' ? '⚠ Needs Human' : '⏳ Pending';

                // Build additional info line
                let extraInfo = [];
                if (n.Company) extraInfo.push(n.Company);
                if (n.Employees) extraInfo.push(`${n.Employees} employees`);
                if (n.Country) extraInfo.push(n.Country);
                const extraLine = extraInfo.length > 0 ? `<div style="font-size: 12px; color: #666; margin-top: 4px;">${extraInfo.join(' • ')}</div>` : '';

                return `
                    <div class="newsletter-item">
                        <div class="newsletter-info">
                            <div class="newsletter-name">${n.name}${n.Company ? ` - ${n.Company}` : ''}</div>
                            <div class="newsletter-url">${n.url}</div>
                            ${extraLine}
                        </div>
                        <div class="action-buttons">
                            <span class="status ${statusClass}">${statusText}</span>
                            ${status === 'failed' ? 
                                `<button class="btn btn-small" onclick="window.open('${n.url}', '_blank')">
                                    Open & Sign Up
                                </button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        }

        async function saveData() {
            try {
                console.log(`Saving ${newsletters.length} newsletters to Supabase...`);
                
                const uploadArea = document.getElementById('uploadArea');
                
                // Batch upload in chunks of 500 (safer for large datasets)
                const chunkSize = 500;
                let savedCount = 0;
                
                for (let i = 0; i < newsletters.length; i += chunkSize) {
                    const chunk = newsletters.slice(i, i + chunkSize);
                    
                    try {
                        await supabase.upsertNewsletters(chunk);
                        savedCount += chunk.length;
                        
                        // Update progress
                        const percent = ((savedCount / newsletters.length) * 100).toFixed(0);
                        uploadArea.innerHTML = `<div style="font-size: 48px; margin-bottom: 16px;">💾</div>
                            <h3>Saving to database... ${savedCount.toLocaleString()} / ${newsletters.length.toLocaleString()} (${percent}%)</h3>`;
                        
                        console.log(`Saved ${savedCount}/${newsletters.length}`);
                        
                        // Small delay to avoid rate limits
                        await new Promise(r => setTimeout(r, 100));
                    } catch (chunkError) {
                        console.error(`Error saving chunk ${i}-${i+chunkSize}:`, chunkError);
                        throw new Error(`Failed to save newsletters (chunk at ${savedCount}): ${chunkError.message}`);
                    }
                }
                
                console.log('✅ Save complete!', savedCount, 'newsletters saved');
            } catch (e) {
                console.error('Error saving to Supabase:', e);
                throw e;
            }
        }

        async function startAutomation() {
            if (!confirm('Start automated signup for all pending newsletters?')) return;
            
            try {
                const response = await fetch('http://209.182.213.100:8080/api/start-automation', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ newsletters: newsletters.filter(n => !statusMap[n.url]) })
                });
                
                if (response.ok) {
                    alert('✅ Automation started! Progress will update automatically every 5 seconds.');
                } else {
                    alert('⚠️ Could not start automation. Check VPS connection.');
                }
            } catch (e) {
                alert('❌ Error starting automation: ' + e.message);
            }
        }
        
        async function clearData() {
            if (!confirm('⚠️ Clear all newsletter data from Supabase? This cannot be undone!')) return;
            
            try {
                await supabase.deleteAll();
                newsletters = [];
                statusMap = {};
                updateUI();
                alert('✅ All data cleared from Supabase!');
            } catch (e) {
                alert('❌ Error clearing data: ' + e.message);
            }
        }
        
        function updateStorageInfo() {
            const stats = newsletters.length;
            const pending = newsletters.filter(n => n.status === 'pending').length;
            const success = newsletters.filter(n => n.status === 'success').length;
            const failed = newsletters.filter(n => n.status === 'failed').length;
            
            document.getElementById('storageInfo').innerHTML = 
                `🗄️ Supabase: ${stats.toLocaleString()} newsletters | ` +
                `⏳ ${pending} pending | ✅ ${success} signed up | ⚠️ ${failed} need human`;
        }

        // Load data on page load
        loadData().then(updateStorageInfo);

        // Auto-refresh every 5 seconds
        setInterval(() => {
            loadData().then(updateStorageInfo);
        }, 5000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Supabase Connection Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #0a0a0a; color: #fff; }
        .pass { color: #B4FF39; }
        .fail { color: #ff4444; }
        pre { background: #1a1a1a; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>🔍 Newsletter Dashboard - Connection Test</h1>
    <div id="results"></div>

    <script>
        // Supabase Client
        const SUPABASE_URL = 'https://eytpovjjhwprfedrdceu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5dHBvdmpqaHdwcmZlZHJkY2V1Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3Mjg0NjYwNSwiZXhwIjoyMDg4NDIyNjA1fQ.p64Gk9WfSXwV4fCBlJV-o2JH8zrkX6hFTdzK7yxLC0o';

        class SupabaseClient {
          constructor() {
            this.baseUrl = SUPABASE_URL;
            this.apiKey = SUPABASE_KEY;
          }

          async request(path, method = 'GET', body = null) {
            const options = {
              method: method,
              headers: {
                'apikey': this.apiKey,
                'Authorization': `Bearer ${this.apiKey}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation'
              }
            };

            if (body && method !== 'GET') {
              options.body = JSON.stringify(body);
            }

            const response = await fetch(this.baseUrl + path, options);
            
            if (!response.ok) {
              const text = await response.text();
              throw new Error(`Supabase error: ${response.status} ${response.statusText} - ${text}`);
            }

            return await response.json();
          }

          async upsertNewsletter(newsletter) {
            return this.request('/rest/v1/newsletters', 'POST', newsletter);
          }

          async upsertNewsletters(newsletters) {
            return this.request('/rest/v1/newsletters', 'POST', newsletters);
          }

          async getNewsletters(status = null) {
            let path = '/rest/v1/newsletters?select=*&order=created_at.desc';
            if (status) {
              path += `&status=eq.${status}`;
            }
            return this.request(path, 'GET');
          }

          async updateStatus(url, status) {
            return this.request(
              `/rest/v1/newsletters?url=eq.${encodeURIComponent(url)}`,
              'PATCH',
              { 
                status: status,
                updated_at: new Date().toISOString(),
                signed_up_at: status === 'success' ? new Date().toISOString() : null
              }
            );
          }

          async deleteAll() {
            return this.request('/rest/v1/newsletters', 'DELETE');
          }
        }
    </script>
    <script>
        const results = document.getElementById('results');
        
        async function test() {
            results.innerHTML = '<p>🔄 Testing connection...</p>';
            
            try {
                const supabase = new SupabaseClient();
                results.innerHTML += '<p class="pass">✅ Supabase client created</p>';
                
                // Test database connection
                const data = await supabase.getNewsletters();
                results.innerHTML += `<p class="pass">✅ Database connected! Found ${data.length} newsletters</p>`;
                
                // Test insert
                const testNewsletter = {
                    url: 'https://test-' + Date.now() + '.example.com',
                    name: 'Test Newsletter',
                    platform: 'test',
                    status: 'pending',
                    data: { test: true }
                };
                
                await supabase.upsertNewsletter(testNewsletter);
                results.innerHTML += '<p class="pass">✅ Test insert successful</p>';
                
                // Verify insert
                const updated = await supabase.getNewsletters();
                results.innerHTML += `<p class="pass">✅ Verification successful! Now ${updated.length} newsletters</p>`;
                
                results.innerHTML += '<h2 class="pass">🎉 ALL TESTS PASSED!</h2>';
                results.innerHTML += '<p>Your dashboard should work perfectly now.</p>';
                results.innerHTML += '<p><a href="index.html" style="color: #B4FF39;">Go to Dashboard →</a></p>';
                
            } catch (error) {
                results.innerHTML += `<p class="fail">❌ Error: ${error.message}</p>`;
                results.innerHTML += '<pre>' + error.stack + '</pre>';
                results.innerHTML += '<h2 class="fail">Tests Failed</h2>';
                results.innerHTML += '<p>Check the console for more details.</p>';
                console.error('Test error:', error);
            }
        }
        
        test();
    </script>
</body>
</html>
